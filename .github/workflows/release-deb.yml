name: Release .deb packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish to a release'
        type: boolean
        default: true

jobs:
  build:
    name: Build (${{ matrix.distro }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-22.04
            image: ubuntu:22.04
          - distro: ubuntu-24.04
            image: ubuntu:24.04
          - distro: debian-12
            image: debian:bookworm
          - distro: debian-13
            image: debian:trixie
    steps:
      - name: Install system build deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config scdoc git curl ca-certificates \
            libc6-dev

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.distro }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ matrix.distro }}-cargo-

      - name: Cache cargo-deb binary
        id: cache-cargo-deb
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deb
          key: ${{ matrix.distro }}-cargo-deb-v3

      - name: Install cargo-deb
        if: steps.cache-cargo-deb.outputs.cache-hit != 'true'
        run: cargo install cargo-deb --locked

      - name: Generate man pages
        run: make -C man

      - name: Build release binaries
        run: cargo build --release -p netanvil-cli -p netanvil-test-servers

      - name: Package netanvil-cli
        run: cargo deb -p netanvil-cli --no-build

      - name: Package netanvil-test-servers
        run: cargo deb -p netanvil-test-servers --no-build

      - name: Rename .debs with distro suffix
        working-directory: target/debian
        run: |
          for f in *.deb; do
            new=$(echo "$f" | sed "s/\(_[^_]*\)\.deb$/_${{ matrix.distro }}\1.deb/")
            mv "$f" "$new"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro }}
          path: target/debian/*.deb
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          merge-multiple: true
          path: debs

      - uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
          generate_release_notes: true
